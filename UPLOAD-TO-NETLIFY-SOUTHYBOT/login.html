<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login | Southwestern University, Nigeria</title>
    <meta
      name="description"
      content="Login page for Southwestern University, Nigeria student and applicant portal."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css?v=hover-copy-1" />
  </head>
  <body class="login-page">
    <main class="login-shell">
      <section class="login-media" aria-label="Southwestern University portal">
        <img
          src="https://southwesternuniversity.edu.ng/wp-content/uploads/2018/07/home_slide1.jpg"
          alt="Southwestern University campus"
        />
        <div class="login-media-overlay"></div>
        <div class="login-media-content">
          <a class="brand login-brand" href="./index.html" aria-label="Back to home">
            <span class="brand-mark">SU</span>
            <span>
              <strong>Southwestern University</strong>
              <small>Nigeria</small>
            </span>
          </a>
          <div>
            <p class="eyebrow">Student Portal</p>
            <h1>Access your Southwestern University account.</h1>
            <p>
              Continue to admissions, finance, course registration, and student records.
            </p>
          </div>
        </div>
      </section>

      <section class="login-panel" aria-label="Login form">
        <div class="login-card">
          <div class="login-card-header">
            <a class="back-link" href="./index.html">
              <i data-lucide="arrow-left"></i>
              Back to site
            </a>
            <h2>Sign in</h2>
          </div>

          <div class="role-tabs" role="tablist" aria-label="Login role">
            <button class="role-tab is-active" type="button" role="tab" aria-selected="true" data-role-tab="student">
              <i data-lucide="graduation-cap"></i>
              Student
            </button>
            <button class="role-tab" type="button" role="tab" aria-selected="false" data-role-tab="applicant">
              <i data-lucide="file-user"></i>
              Applicant
            </button>
            <button class="role-tab" type="button" role="tab" aria-selected="false" data-role-tab="staff">
              <i data-lucide="briefcase-business"></i>
              Staff
            </button>
          </div>

          <form class="login-form" data-login-form>
            <input type="hidden" name="role" value="student" data-role-input />

            <label class="field">
              <span>Username or email</span>
              <div class="field-control">
                <i data-lucide="user"></i>
                <input name="username" type="text" autocomplete="username" placeholder="Enter username" required />
              </div>
            </label>

            <label class="field">
              <span>Password</span>
              <div class="field-control">
                <i data-lucide="lock"></i>
                <input
                  name="password"
                  type="password"
                  autocomplete="current-password"
                  placeholder="Enter password"
                  required
                  data-password-input
                />
                <button class="field-icon-button" type="button" aria-label="Show password" data-password-toggle>
                  <i data-lucide="eye"></i>
                </button>
              </div>
            </label>

            <div class="form-options">
              <label class="remember">
                <input type="checkbox" name="remember" />
                <span>Remember me</span>
              </label>
              <a href="https://mysun.edu.ng" target="_blank" rel="noreferrer">Forgot password?</a>
            </div>

            <button class="login-submit" type="submit">
              <i data-lucide="log-in"></i>
              Sign in
            </button>

            <p class="login-message" data-login-message aria-live="polite"></p>
          </form>

          <div class="login-card-footer">
            <span>New applicant?</span>
            <a href="https://mysun.edu.ng" target="_blank" rel="noreferrer">Create admission account</a>
          </div>
        </div>
      </section>
    </main>

    <script src="./script.js?v=chat-personality-3"></script>
    <script
      src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"
      async
      onload="window.lucide && window.lucide.createIcons()"
    ></script>
  </body>
</html>
