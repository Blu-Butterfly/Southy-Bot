[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  included_files = ["netlify/functions/data/**"]

[[redirects]]
  from = "/api/knowledge-base"
  to = "/.netlify/functions/knowledge-base"
  status = 200

[[redirects]]
  from = "/api/login"
  to = "/.netlify/functions/login"
  status = 200

[[redirects]]
  from = "/api/session"
  to = "/.netlify/functions/session"
  status = 200

[[redirects]]
  from = "/api/logout"
  to = "/.netlify/functions/logout"
  status = 200

[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/health"
  status = 200
